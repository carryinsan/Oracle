<div class="sidebar-layout animate-reveal" id="research-view">
    
    <aside id="timeline-panel" class="frosted-glass scroll-container" style="padding: 1.5rem;">
        <h3 style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.5rem;">Execution Pipeline</h3>
        <div id="timeline-container">
            </div>
    </aside>

    <section id="research-feed" class="frosted-glass" style="display: flex; flex-direction: column; overflow: hidden; position: relative;">
        
        <canvas id="ambient-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.5; pointer-events: none;"></canvas>

        <div style="padding: 2rem; border-bottom: 1px solid var(--border-subtle); z-index: 1; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="current-task-display" style="font-weight: 500;">Initializing DAG Orchestration...</h2>
            <div id="global-progress-ring">
                </div>
        </div>

        <article id="live-log-container" class="scroll-container" style="flex: 1; padding: 2rem; z-index: 1;">
            </article>
    </section>
</div>
