<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI | Active Pipeline</title>
    <style>
        /* Inherit core CSS variables from index logic */
        :root {
            --bg-deep: #050508;
            --surface-glass: rgba(15, 15, 25, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-glow: #3a86ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --font-stack: 'Inter', system-ui, sans-serif;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-stack); margin: 0; }
        
        #global-error-toast { /* Same as index.html */ display:none; }

        .research-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        .timeline-sidebar {
            background: rgba(10, 10, 15, 0.8);
            border-right: 1px solid var(--border-glass);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .execution-main {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            overflow-y: auto; /* Strict boundary fix */
        }

        .glass-panel {
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 20px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-glow);
            box-shadow: 0 0 10px var(--accent-glow);
            transition: width 0.4s ease;
        }

        #live-feed-container {
            flex-grow: 1;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid var(--border-glass);
        }
    </style>
</head>
<body>
    <div id="global-error-toast" class="hidden"></div>

    <main id="app-root">
        <div class="research-layout">
            <aside class="timeline-sidebar">
                <h3 style="color: var(--accent-glow); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;">DAG Trajectory</h3>
                <div id="timeline-nodes">
                    </div>
            </aside>

            <section class="execution-main">
                <header>
                    <h2 style="font-weight: 400;">Executing 40-Pass Research...</h2>
                </header>
                
                <div class="glass-panel">
                    <div class="progress-container">
                        <div id="master-progress-bar" class="progress-bar"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                        <span id="status-label">Phase 1: Ingestion</span>
                        <span id="pass-counter">Pass 1/40</span>
                    </div>
                </div>

                <div id="live-feed-container">
                    </div>
            </section>
        </div>
    </main>

    <script type="module" src="js/core/app.js"></script>
</body>
</html>
