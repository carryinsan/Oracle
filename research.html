<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI | Active Pipeline</title>
    <style>
        :root {
            --bg-deep: #030406; 
            --sidebar-bg: #06070a;
            --main-bg: #090a0f;
            --border-glass: rgba(255, 255, 255, 0.05);
            --accent-glow: #3a86ff;
            --accent-green: #00f5d4;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --font-stack: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-stack); 
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
        }
        
        #global-error-toast { display:none; }

        /* Unbreakable Flexbox Layout */
        .research-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- LEFT SIDEBAR (DAG TIMELINE) --- */
        .timeline-sidebar {
            width: 280px;
            min-width: 280px;
            flex-shrink: 0;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-glass);
            padding: 35px 25px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: none; 
        }
        .timeline-sidebar::-webkit-scrollbar { display: none; }

        .sidebar-title {
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* The continuous vertical line */
        #timeline-nodes {
            position: relative;
            display: flex;
            flex-direction: column;
        }
        #timeline-nodes::before {
            content: '';
            position: absolute;
            left: 4.5px; /* Centers perfectly behind a 10px dot */
            top: 5px;
            bottom: 25px;
            width: 1px;
            background: rgba(255, 255, 255, 0.08);
            z-index: 1;
        }

        #timeline-nodes > div {
            position: relative;
            z-index: 2;
        }

        /* --- RIGHT MAIN AREA (TERMINAL) --- */
        .execution-main {
            flex-grow: 1;
            background: var(--main-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .execution-header {
            padding: 35px 45px 20px 45px;
            border-bottom: 1px solid var(--border-glass);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 110px;
        }

        #status-label {
            font-size: 1.15rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 5px;
        }

        #pass-counter {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-family: var(--font-stack);
            font-weight: 500;
        }

        /* Ultra-thin progress bar on top edge */
        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: transparent;
            z-index: 10;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-glow);
            box-shadow: 0 0 15px var(--accent-glow);
            transition: width 0.4s ease;
        }

        /* --- LIVE TERMINAL FEED --- */
        #live-feed-container {
            flex-grow: 1;
            padding: 25px 45px 50px 45px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.7;
            color: #8b949e; 
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        #live-feed-container::-webkit-scrollbar { width: 6px; }
        #live-feed-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        #live-feed-container::-webkit-scrollbar-track { background: transparent; }

        #live-feed-container div {
            margin-bottom: 8px !important;
            word-wrap: break-word;
        }

        /* --- EXACT BUTTON OVERRIDE --- 
           Forces the JS-injected button to match the dark blue pill-shape in screenshot */
        #source-explorer-btn {
            top: 35px !important;
            right: 45px !important;
            background: rgba(14, 25, 45, 0.7) !important;
            border: 1px solid rgba(58, 134, 255, 0.3) !important;
            color: #60a5fa !important;
            border-radius: 20px !important; 
            padding: 9px 18px !important;
            font-size: 0.85rem !important;
            font-weight: 500 !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
            transition: all 0.2s ease !important;
            backdrop-filter: blur(10px) !important;
        }
        #source-explorer-btn:hover {
            background: rgba(58, 134, 255, 0.15) !important;
            border-color: var(--accent-glow) !important;
        }
        
        #source-explorer-panel {
            top: 85px !important;
            right: 45px !important;
            background: #0b1121 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7) !important;
        }
    </style>
</head>
<body>
    <div id="global-error-toast" class="hidden"></div>

    <main id="app-root">
        <div class="research-layout">
            
            <aside class="timeline-sidebar">
                <div class="sidebar-title">Execution Pipeline</div>
                <div id="timeline-nodes">
                    </div>
            </aside>

            <section class="execution-main">
                
                <div class="progress-container">
                    <div id="master-progress-bar" class="progress-bar"></div>
                </div>

                <header class="execution-header">
                    <h2 id="status-label">Initializing DAG Orchestration...</h2>
                    <span id="pass-counter"></span>
                </header>

                <div id="live-feed-container">
                    </div>

                </section>
        </div>
    </main>

    <script type="module" src="js/core/app.js"></script>
</body>
</html>
