<div class="sidebar-layout animate-reveal" id="research-view">
    <aside id="timeline-panel" class="frosted-glass scroll-container" style="padding: 1.5rem; position: relative;">
        <h3 style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.5rem;">Execution Pipeline</h3>
        <div id="timeline-container"></div>
    </aside>

    <section id="research-feed" class="frosted-glass" style="display: flex; flex-direction: column; overflow: hidden; position: relative;">
        
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-subtle); z-index: 2; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3);">
            <h2 id="current-task-display" style="font-weight: 500; font-size: 1.2rem;">Initializing DAG Orchestration...</h2>
            <button id="toggle-live-sources-btn" class="action-button">Researching 0 Sources ▼</button>
        </div>

        <div id="live-sources-panel" class="scroll-container" style="display: none; position: absolute; top: 75px; right: 0; width: 100%; max-height: calc(100% - 75px); background: rgba(10, 10, 15, 0.95); z-index: 10; padding: 1.5rem; border-bottom: 1px solid var(--border-subtle); backdrop-filter: blur(10px);">
            <div id="live-sources-list">
                </div>
        </div>

        <article id="live-log-container" class="scroll-container" style="flex: 1; padding: 2rem; z-index: 1;">
        </article>
    </section>
</div>
