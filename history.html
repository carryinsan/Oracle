<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI | Session Archive</title>
    <style>
        :root {
            --bg-deep: #050508;
            --surface-glass: rgba(15, 15, 25, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --font-stack: 'Inter', system-ui, sans-serif;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-stack); margin: 0; }
        
        .archive-container {
            max-width: 800px;
            margin: 60px auto;
        }

        .history-item {
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <main id="app-root">
        <div class="archive-container">
            <h2 style="margin-bottom: 24px; font-weight: 400;">Local State Archive</h2>
            <div id="history-list">
                </div>
        </div>
    </main>
    <script type="module" src="js/core/app.js"></script>
</body>
</html>
