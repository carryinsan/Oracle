<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LexisAI | Oracle Research OS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/cinematic.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="dark-theme">
    <div id="ambient-background"></div>
    <div id="grid-overlay"></div>

    <main id="app-root">
        
        <header class="glass-header">
            <div class="logo-container">
                <div class="glow-orb"></div>
                <h1>LexisAI <span class="version-tag">v14.0 OS</span></h1>
            </div>
            <div class="system-status">
                <span class="status-indicator online"></span>
                <span class="status-text">ORACLE ENGINE READY</span>
            </div>
        </header>

        <section id="view-prompt" class="view-layer active">
            <div class="prompt-container glass-panel">
                <h2>Initialize Deep Research</h2>
                <p class="subtitle">Synthesizing multidimensional data across 25 cognitive passes.</p>
                
                <div class="input-wrapper">
                    <textarea id="research-input" placeholder="Define your research parameters..." rows="4"></textarea>
                    <button id="btn-generate-plan" class="btn-primary cinematic-glow">
                        <span>Initialize Plan</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="view-plan" class="view-layer hidden">
            <div class="plan-container glass-panel">
                <h3>Research Trajectory Plan</h3>
                <div id="plan-editor-content" contenteditable="true" class="document-editor">
                    </div>
                <div class="action-bar">
                    <button id="btn-edit-plan" class="btn-secondary">Regenerate Plan</button>
                    <button id="btn-start-research" class="btn-primary cinematic-glow">Execute Research Pipeline</button>
                </div>
            </div>
        </section>

        <section id="view-research" class="view-layer hidden research-layout">
            <aside class="timeline-panel glass-panel">
                <div class="panel-header">Pipeline DAG</div>
                <div id="timeline-container">
                    </div>
            </aside>

            <section class="telemetry-panel glass-panel">
                <div class="panel-header">System Telemetry</div>
                <div id="live-feed-container" class="terminal-output font-mono">
                    </div>
            </section>

            <aside class="source-panel glass-panel">
                <div class="panel-header">Cryptographic Evidence</div>
                <div class="confidence-meter">
                    <span>Source Integrity</span>
                    <div class="progress-bar"><div id="confidence-fill" style="width: 0%;"></div></div>
                </div>
                <div id="source-list-container">
                    </div>
            </aside>
        </section>

    </main>

    <script type="module" src="js/core/app.js"></script>
</body>
</html>
