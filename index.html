<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI | Deep Research Engine</title>
    <style>
        :root {
            --bg-deep: #050508;
            --surface-glass: rgba(15, 15, 25, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-glow: #3a86ff;
            --accent-purple: #8338ec;
            --error-red: #ff2a2a;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --font-stack: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-stack);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(58, 134, 255, 0.08), transparent 60%);
        }

        .glass-panel {
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* Anti-Silent-Failure Global Error Toast */
        #global-error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20, 5, 5, 0.9);
            border: 1px solid var(--error-red);
            color: #fff;
            padding: 16px 24px;
            border-radius: 8px;
            z-index: 9999;
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.4);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            pointer-events: none;
        }
        #global-error-toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .container {
            max-width: 800px;
            margin: 15vh auto 0;
            padding: 40px;
            text-align: center;
        }

        h1.glow-text {
            font-size: 3.5rem;
            background: linear-gradient(90deg, var(--accent-glow), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .query-box {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-glass);
            color: white;
            font-size: 1.1rem;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(58, 134, 255, 0.2);
        }

        button.btn-primary {
            align-self: center;
            padding: 16px 32px;
            background: transparent;
            border: 1px solid var(--accent-glow);
            color: var(--accent-glow);
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.btn-primary:hover {
            background: rgba(58, 134, 255, 0.1);
            box-shadow: 0 0 20px rgba(58, 134, 255, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div id="global-error-toast">
        <strong style="color: var(--error-red);">[FATAL]</strong>
        <span id="error-message-text">System failure.</span>
    </div>

    <main id="app-root">
        <div class="container glass-panel">
            <h1 class="glow-text">LexisAI</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Oracle-Level Deep Research Engine</p>
            
            <div class="query-box">
                <input type="text" id="research-query-input" placeholder="Initialize research directive..." autocomplete="off">
                <button type="button" id="btn-init-research" class="btn-primary">Initialize Pipeline</button>
            </div>
        </div>
    </main>

    <script type="module" src="js/core/app.js"></script>
</body>
</html>
