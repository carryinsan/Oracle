<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI - Oracle Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Enterprise Glassmorphic Variables */
        :root {
            --bg-color: #050507;
            --color-surface: rgba(15, 15, 20, 0.7);
            --text-primary: #f0f0f5;
            --text-secondary: #9aa0a6;
            --glow-accent: #3b82f6;
            --glow-indigo: #6366f1;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --font-primary: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 1. The Quantum Canvas */
        .quantum-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, var(--glow-accent), transparent 70%); top: -100px; left: -100px; }
        .orb-2 { width: 600px; height: 600px; background: radial-gradient(circle, var(--glow-indigo), transparent 70%); bottom: -200px; right: -100px; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, 50px) scale(1.1); } }

        /* 2. SPA Target Container */
        #app { width: 100vw; min-height: 100vh; }

        .home-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            gap: 2rem;
            padding: 2rem;
        }

        .sidebar {
            background: var(--color-surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .main-module {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
        }

        .lexis-logo {
            font-size: 4rem;
            font-weight: 300;
            margin-bottom: 2.5rem;
            background: linear-gradient(135deg, #ffffff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* THE TRUE FIX: Non-submitting search interface */
        .search-container {
            position: relative;
            width: 100%;
            margin-bottom: 1.5rem;
        }

        #search-input {
            width: 100%;
            padding: 1.2rem 4rem 1.2rem 1.8rem;
            font-size: 1.1rem;
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid var(--border-subtle);
            border-radius: 25px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }

        /* Explicit type="button" button prevents reloads */
        #btn-send {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--glow-accent);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #btn-send svg { width: 20px; height: 20px; fill: white; }
    </style>
</head>
<body>

    <div class="quantum-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div id="app">
        <div class="home-layout">
            <aside class="sidebar">
                <div style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">System Status</div>
                <div style="margin-top: 10px; color: var(--glow-accent);">● Engine Online</div>
            </aside>

            <main class="main-module">
                <h1 class="lexis-logo">LexisAI</h1>
                
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Execute a predictive analysis..." autocomplete="off">
                    <button type="button" id="btn-send">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>

                <div class="dropzone" id="document-dropzone" style="width: 100%; padding: 2rem; border: 2px dashed var(--border-subtle); border-radius: 16px; text-align: center; color: var(--text-secondary);">
                    [ + Drag & Drop Context Files ]
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="./js/core/app.js"></script>
</body>
</html>
