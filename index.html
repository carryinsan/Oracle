<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI | Predictive Oracle Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ==================================================
           CORE DESIGN TOKENS & VARIABLES
           ================================================== */
        :root {
            --bg-color: #030305;
            --color-surface: rgba(15, 15, 20, 0.4);
            --color-surface-hover: rgba(25, 25, 35, 0.6);
            --text-primary: #f0f0f5;
            --text-secondary: #9aa0a6;
            --glow-accent: #3b82f6;
            --glow-accent-secondary: #8b5cf6;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(59, 130, 246, 0.3);
            --error-color: #ef4444;
            --success-color: #10b981;
            --font-primary: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-lg: 24px;
            --radius-md: 12px;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-primary);
            font-family: var(--font-primary); overflow: hidden; line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ==================================================
           QUANTUM CANVAS SUBSYSTEM (Animated Background)
           ================================================== */
        #app-root {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        .quantum-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden; pointer-events: none;
        }

        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px);
            opacity: 0.4; animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px; height: 400px; background: radial-gradient(circle, var(--glow-accent), transparent 70%);
            top: -10%; left: -10%;
        }

        .orb-2 {
            width: 500px; height: 500px; background: radial-gradient(circle, var(--glow-accent-secondary), transparent 70%);
            bottom: -20%; right: -10%; animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* ==================================================
           GLOBAL UTILITIES & GLASSMORPHISM
           ================================================== */
        .frosted-glass {
            background: var(--color-surface);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .scroll-container { overflow-y: auto; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }

        @keyframes fade-in-up { 
            0% { opacity: 0; transform: translateY(30px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }
        .animate-reveal { animation: fade-in-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* ==================================================
           ASYMMETRIC INTERFACE MATRIX (Layout)
           ================================================== */
        .landing-container {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem;
        }

        .app-header {
            position: absolute; top: 2rem; left: 3rem; right: 3rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand-title {
            font-size: 1.8rem; font-weight: 700; letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .api-status {
            display: flex; align-items: center; gap: 8px;
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03); padding: 6px 12px; border-radius: 20px;
            border: 1px solid var(--border-subtle);
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--success-color);
            box-shadow: 0 0 10px var(--success-color); animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .matrix-layout {
            display: grid; grid-template-columns: 280px 1fr; gap: 2rem;
            width: 100%; max-width: 1100px; margin-top: 4rem;
        }

        /* ==================================================
           LEFT PANEL: Metrics & History
           ================================================== */
        .left-panel {
            border-radius: var(--radius-lg); padding: 1.5rem;
            display: flex; flex-direction: column; gap: 1.5rem;
        }

        .panel-heading {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 600;
        }

        .action-button {
            width: 100%; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--border-highlight);
            color: var(--glow-accent); padding: 12px 16px; border-radius: var(--radius-md);
            cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: var(--transition-smooth);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        .action-button:hover { 
            background: rgba(59, 130, 246, 0.2); transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2); 
        }

        .metrics-box {
            background: rgba(0,0,0,0.3); border-radius: var(--radius-md); padding: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .metric-label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary); display: block; margin-bottom: 6px; }
        .metric-value { font-size: 1.2rem; font-weight: 600; color: #fff; }

        /* ==================================================
           CENTRAL MODULE: Search & Dropzone
           ================================================== */
        .central-module {
            display: flex; flex-direction: column; justify-content: center; gap: 1.5rem;
        }

        .hero-prompt {
            font-size: 2.8rem; font-weight: 400; line-height: 1.2; letter-spacing: -0.5px;
            margin-bottom: 1rem;
        }

        .hero-prompt span {
            background: linear-gradient(90deg, var(--glow-accent), var(--glow-accent-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600;
        }

        .search-wrapper { position: relative; width: 100%; border-radius: 30px; transition: var(--transition-smooth); }
        .search-wrapper:focus-within { transform: scale(1.02); box-shadow: 0 10px 40px rgba(59, 130, 246, 0.2); }

        input.cinematic-input {
            width: 100%; background: var(--color-surface); border: 1px solid var(--border-subtle);
            color: var(--text-primary); padding: 20px 30px; border-radius: 30px;
            font-size: 1.1rem; outline: none; transition: var(--transition-smooth);
            padding-right: 70px; backdrop-filter: blur(16px);
        }
        input.cinematic-input:focus { border-color: var(--glow-accent); }
        input.cinematic-input::placeholder { color: rgba(255,255,255,0.3); }

        .send-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: var(--glow-accent); border: none; width: 44px; height: 44px;
            border-radius: 50%; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition-smooth); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        .send-btn:hover { background: var(--glow-accent-secondary); transform: translateY(-50%) scale(1.1); box-shadow: 0 0 25px rgba(139, 92, 246, 0.6); }

        /* ==================================================
           INTELLIGENT ASSET PIPELINE DROPZONE
           ================================================== */
        .dropzone {
            border: 2px dashed var(--border-subtle); border-radius: var(--radius-lg);
            padding: 2.5rem 2rem; text-align: center; transition: var(--transition-smooth);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; background: rgba(0,0,0,0.2);
        }

        .dropzone:hover {
            border-color: var(--glow-accent); background: rgba(59, 130, 246, 0.05);
            box-shadow: inset 0 0 30px rgba(59, 130, 246, 0.1);
        }

        .drop-icon { color: var(--text-secondary); transition: var(--transition-smooth); }
        .dropzone:hover .drop-icon { color: var(--glow-accent); transform: translateY(-5px); }
        
        .drop-text { font-size: 1rem; font-weight: 500; color: var(--text-primary); }
        .drop-subtext { font-family: var(--font-mono); font-size: 0.8rem; color: var(--glow-accent-secondary); opacity: 0.8; }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .matrix-layout { grid-template-columns: 1fr; gap: 2rem; margin-top: 2rem; }
            .hero-prompt { font-size: 2.2rem; }
            .app-header { left: 1.5rem; right: 1.5rem; }
            .left-panel { display: none; /* Hide sidebar on mobile landing for cleaner look */ }
        }
    </style>
</head>
<body>
    <main id="app-root" class="scroll-container">
        
        <div class="quantum-canvas">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>

        <section class="landing-container animate-reveal">
            
            <header class="app-header">
                <div class="brand-title">LexisAI</div>
                <div class="api-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Node Matrix: Armed</span>
                </div>
            </header>

            <div class="matrix-layout">
                
                <aside class="left-panel frosted-glass">
                    <div>
                        <h3 class="panel-heading">Archives</h3>
                        <button id="btn-history" class="action-button">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            Session History
                        </button>
                    </div>
                    
                    <div style="margin-top: auto;">
                        <h3 class="panel-heading">System Load</h3>
                        <div class="metrics-box">
                            <span class="metric-label">DAG Orchestrator</span>
                            <span class="metric-value">Standby</span>
                        </div>
                    </div>
                </aside>

                <div class="central-module">
                    <h1 class="hero-prompt">What shall we <span>predict</span> today?</h1>
                    
                    <form id="query-form" style="width: 100%;">
                        <div class="search-wrapper">
                            <input type="text" id="main-search-input" class="cinematic-input" placeholder="Initiate multi-stage predictive research..." required autocomplete="off">
                            <button type="submit" class="send-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: -2px;">
                                    <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </form>

                    <div id="asset-dropzone" class="dropzone frosted-glass">
                        <svg class="drop-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        <p class="drop-text">Drag & Drop Documents or Datasets</p>
                        <span class="drop-subtext">Context parsing system active</span>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script type="module" src="./js/core/app.js"></script>
</body>
</html>
