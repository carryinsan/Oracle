<div style="width: 100%; height: 100%; display: flex; flex-direction: column;">
    
    <header class="frosted-glass" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin: 15px 30px 0 30px;">
        <button id="btn-back-home" class="action-button" style="background: transparent; color: var(--text-primary); border-color: var(--border-subtle);">← Back to Home</button>
        <div style="display: flex; gap: 15px;">
            <button id="btn-view-final-sources" class="action-button" style="background: transparent; border-color: var(--glow-accent-secondary); color: var(--glow-accent-secondary);">View All Extracted Sources</button>
            <button id="btn-download-pdf" class="action-button">Download as PDF</button>
        </div>
    </header>

    <div class="report-layout animate-reveal scroll-container">
        <aside class="toc-container scroll-container">
            <h3 style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 1rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px;">Table of Contents</h3>
            <nav id="dynamic-toc">
                </nav>
        </aside>

        <main id="pdf-export-area" class="frosted-glass scroll-container" style="padding: 3rem; background: var(--bg-color);">
            <h1 id="report-title" class="typography-h1" style="margin-bottom: 1rem;">Synthesized Predictive Output</h1>
            <div style="display: flex; gap: 1rem; margin-bottom: 3rem; color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.85rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 1rem;">
                <span id="meta-confidence">System Confidence: 99.8%</span>
                <span id="meta-sources-final">Sources Verified: Calculating...</span>
            </div>
            
            <div id="report-content-container" style="font-size: 1.1rem; line-height: 1.8;">
                </div>
        </main>
    </div>

    <div id="final-sources-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 2rem;">
        <div class="frosted-glass scroll-container" style="width: 100%; max-width: 800px; max-height: 80vh; padding: 2rem; position: relative;">
            <button id="close-sources-modal" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">×</button>
            <h2 style="margin-bottom: 1.5rem; color: var(--glow-accent);">Verified Source Repository</h2>
            <div id="final-sources-list"></div>
        </div>
    </div>
</div>
