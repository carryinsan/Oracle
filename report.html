<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI | Synthesis Report</title>
    <style>
        :root {
            --bg-deep: #050508;
            --surface-glass: rgba(15, 15, 25, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-glow: #3a86ff;
            --text-main: #e2e8f0;
            --font-stack: 'Inter', system-ui, sans-serif;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-stack); margin: 0; line-height: 1.6; }
        
        .report-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .report-header {
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .report-content h1, .report-content h2, .report-content h3 {
            color: #fff;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .report-content p {
            margin-bottom: 16px;
            color: #cbd5e1;
        }

        /* Inline Citation styling */
        .citation-tag {
            color: var(--accent-glow);
            font-size: 0.8em;
            vertical-align: super;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-export {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            background: var(--accent-glow);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(58, 134, 255, 0.4);
        }
    </style>
</head>
<body>
    <main id="app-root">
        <article class="report-container">
            <header class="report-header">
                <h1 id="report-title">Synthesizing...</h1>
                <p style="color: #64748b; font-size: 0.9rem;" id="report-meta">LexisAI Multi-Agent Synthesis</p>
            </header>
            
            <div id="report-content" class="report-content">
                </div>
            
            <div id="bibliography-section" style="margin-top: 50px; border-top: 1px solid var(--border-glass); padding-top: 20px;">
                </div>
        </article>

        <button class="btn-export" onclick="window.location.hash='#/export'">Export to PDF</button>
    </main>
    <script type="module" src="js/core/app.js"></script>
</body>
</html>
