<div class="report-layout animate-reveal scroll-container" style="max-width: 1000px; margin: 0 auto; padding: 4rem 2rem;">
    
    <header style="margin-bottom: 4rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 2rem;">
        <h1 id="report-title" class="typography-h1">Synthesized Output</h1>
        <div style="display: flex; gap: 1rem; margin-top: 1rem; color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.85rem;">
            <span id="meta-confidence">System Confidence: Calculating...</span>
            <span id="meta-sources">Sources Verified: 0</span>
        </div>
    </header>

    <main id="report-content-container" style="font-size: 1.1rem; line-height: 1.8;">
        </main>

    <div id="citation-tooltip" class="frosted-glass" style="position: absolute; display: none; padding: 1rem; max-width: 300px; z-index: 100; font-size: 0.9rem;">
        </div>
</div>
