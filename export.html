<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI | Export Format</title>
    <style>
        :root {
            --bg-deep: #050508;
            --surface-glass: rgba(15, 15, 25, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-glow: #3a86ff;
            --text-main: #e2e8f0;
            --font-stack: 'Inter', system-ui, sans-serif;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-stack); margin: 0; }
        
        .export-box {
            max-width: 500px;
            margin: 100px auto;
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        .btn-confirm {
            margin-top: 30px;
            padding: 14px 28px;
            background: var(--accent-glow);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <main id="app-root">
        <div class="export-box">
            <h2>Compile Document</h2>
            <p style="color: #94a3b8; margin: 15px 0 25px; font-size: 0.9rem;">
                Warning: Massive >30 page DAG syntheses may require extended Canvas rendering time on mobile processors.
            </p>
            <div style="text-align: left; margin-bottom: 20px;">
                <label><input type="checkbox" id="inc-citations" checked> Include UUID Citations</label><br><br>
                <label><input type="checkbox" id="inc-metadata" checked> Include Confidence Metadata</label>
            </div>
            <button class="btn-confirm" id="btn-generate-pdf">Initialize PDF Canvas</button>
        </div>
    </main>
    <script type="module" src="js/core/app.js"></script>
</body>
</html>
